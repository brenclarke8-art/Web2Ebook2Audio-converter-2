name: Local DeepSeek Config
version: 1.0.0
schema: v1

models:
  # DeepSeek Coder V2 16B (main chat/edit/apply model)
  - uses: ollama/deepseek-coder-v2:16b
    with:
      apiBase: http://localhost:11434
      temperature: 0.1
      max_tokens: 4096

  # Fast autocomplete model
  - uses: ollama/qwen2.5-coder-1.5b-base

  # Embeddings model
  - uses: ollama/nomic-embed-text

# Optional MCP servers (you can remove this if not needed)
mcpServers: []
